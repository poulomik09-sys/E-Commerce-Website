<!doctype html>
<html>
     <head>
          <meta charset="utf-8">
          <title>Test</title>
          <link rel="stylesheet" href="style1.css">
     </head>
     <body>
          <header> E-Commerce Website </header>
          <div class="container">
               <h1 class="spin-text">Welcome to our E-Commerce Website</h1>
               <div class="product-image">
                    <img src="-original-imah4eddxhvzpxhc.webp" alt="Product Image" height="200" width="200">
               </div>
               <div class="product-details">
                    <h2>Product Name: Smart Watch</h2>
                    <p class="price">Price: ₹2,999</p>
                    <p class="description">This smart watch comes with fitness tracking, heart rate monitor, and long battery life. Perfect for daily use.</p>
                    <label>Quantity:</label>
                    <input type="number" id="qty" value="1" min="1">
                    <div class="buttons">
                         <button onclick="addToCart()">Add to Cart</button>
                         <button onclick="buyNow()">Buy Now</button>
                    </div>
               </div>
          </div>
          <script src="script.js"></script>
     </body>
</html>
